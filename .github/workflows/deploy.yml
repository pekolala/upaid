name: Deploy to Sakura Internet

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
    
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Sync files via lftp
      run: |
        lftp -c "
          set ftp:ipv6-allow false;
          set ftp:ssl-allow true;
          set ssl:verify-certificate false;
          open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' '${{ secrets.FTP_SERVER }}';
          mirror -R -v --delete --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .gitignore ./ www/samplesite/
        "
